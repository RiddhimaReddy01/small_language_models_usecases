<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SDDF Final Report Preview</title>
    <style>
      body {
        margin: 0;
        background: #f3f1eb;
        color: #1a1a1a;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .frame {
        min-height: 100vh;
        padding: 24px;
      }

      .status {
        max-width: 840px;
        margin: 0 auto 16px;
        padding: 12px 14px;
        border-radius: 10px;
        background: #fffdf8;
        border: 1px solid #e7dfcf;
        color: #5d513c;
        font-size: 13px;
      }

      .mount {
        max-width: 900px;
        margin: 0 auto;
        background: #fff;
        border-radius: 16px;
        box-shadow: 0 16px 50px rgba(27, 42, 62, 0.08);
        padding: 16px;
      }
    </style>
  </head>
  <body>
    <div class="frame">
      <div class="status" id="status">Loading `sddf_combined_paper.jsx`...</div>
      <div class="mount">
        <div id="root"></div>
      </div>
    </div>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script>
      async function boot() {
        const status = document.getElementById("status");

        try {
          const response = await fetch("./sddf_combined_paper.jsx");
          if (!response.ok) {
            throw new Error("Could not load the JSX report file.");
          }

          let source = await response.text();
          source = source.replace(/^import\s+\{[^}]+\}\s+from\s+"react";\s*/m, "");
          source = source.replace(/export\s+default\s+function\s+Paper/, "function Paper");
          source += "\nwindow.__SDDFPaper = Paper;";

          const transformed = Babel.transform(source, {
            presets: ["react"],
            filename: "sddf_combined_paper.jsx",
          }).code;

          const runner = new Function("React", transformed);
          runner(window.React);

          const root = ReactDOM.createRoot(document.getElementById("root"));
          root.render(React.createElement(window.__SDDFPaper));
          status.textContent = "Preview loaded from local file: sddf_combined_paper.jsx";
        } catch (error) {
          console.error(error);
          status.textContent = "Preview failed to load. " + error.message;
        }
      }

      boot();
    </script>
  </body>
</html>
