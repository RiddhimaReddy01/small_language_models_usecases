datasets:
  - name: GSM8K
    path: data/processed/gsm8k.jsonl
    sample_size: 9
  - name: SVAMP
    path: data/processed/svamp.jsonl
    sample_size: 9

models:
  - id: tinyllama_1_1b
    type: local
    endpoint_env: OLLAMA_API_URL
    provider_model: tinyllama:1.1b
  - id: qwen2_5_1_5b
    type: local
    endpoint_env: OLLAMA_API_URL
    provider_model: qwen2.5:1.5b
  - id: phi3_mini
    type: local
    endpoint_env: OLLAMA_API_URL
    provider_model: phi3:mini

runner:
  concurrency: 1
  timeout_seconds: 120

protocol:
  repeats_on_subset: 2
  robustness_perturbations: 2
