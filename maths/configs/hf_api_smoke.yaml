datasets:
  - name: GSM8K
    path: maths/data/processed/gsm8k.jsonl
    sample_size: 2
  - name: SVAMP
    path: maths/data/processed/svamp.jsonl
    sample_size: 2

models:
  - id: qwen2_5_0_5b_instruct_hf
    type: huggingface
    hf_model: Qwen/Qwen2.5-0.5B-Instruct
    api_key_env: HF_API_KEY

runner:
  concurrency: 1
  timeout_seconds: 90

protocol:
  repeats_on_subset: 0
  robustness_perturbations: 0
