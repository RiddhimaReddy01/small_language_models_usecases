datasets:
  - name: GSM8K
    path: data/gsm8k.jsonl
    sample_size: 6

models:
  - id: gemini_2_0_flash
    type: gemini
    api_url_env: GEMINI_API_URL
    api_key_env: GEMINI_API_KEY

runner:
  concurrency: 1
  timeout_seconds: 60

protocol:
  repeats_on_subset: 1
  robustness_perturbations: 1

